name: link-checker

on:
  pull_request:
    paths:
      - "lychee.toml"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "claudedocs/**"
      - "formula-status/**"
      - ".github/workflows/link-checker.yml"
  push:
    branches:
      - main
    paths:
      - "lychee.toml"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "claudedocs/**"
      - "formula-status/**"
      - ".github/workflows/link-checker.yml"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: link-checker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Restore lychee cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ runner.os }}-${{ hashFiles('lychee.toml') }}-${{ github.sha }}
          restore-keys: |
            cache-lychee-${{ runner.os }}-${{ hashFiles('lychee.toml') }}-
            cache-lychee-${{ runner.os }}-

      - name: Link Checker
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config ./lychee.toml --no-progress README.md cmd docs claudedocs formula-status
