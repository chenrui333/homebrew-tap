name: link-checker

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: link-checker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore lychee cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ runner.os }}-${{ hashFiles('lychee.toml') }}-${{ github.sha }}
          restore-keys: |
            cache-lychee-${{ runner.os }}-${{ hashFiles('lychee.toml') }}-
            cache-lychee-${{ runner.os }}-

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config ./lychee.toml --no-progress README.md cmd docs claudedocs formula-status
