name: Clean up closed PRs

on:
  pull_request_target:
    types:
      - closed

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1
  HOMEBREW_DISABLE_LOAD_FORMULA: 1
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  PR: ${{ github.event.number }}

jobs:
  cancel-tests:
    if: >
      github.repository_owner == 'chenrui333' &&
      !github.event.pull_request.merged
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/homebrew/ubuntu24.04:main@sha256:a840aafb588bf996ec91d46e2205b7cac9bfb614d838da715c53bca0ada54b16
    permissions:
      contents: read
      actions: write # for `gh run cancel`
      checks: read # for `GitHub.get_workflow_run`
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
        with:
          core: false
          cask: false

      - name: Check CI status
        id: check
        continue-on-error: true
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew check-ci-status --cancel "$PR"

      - name: Cancel tests
        if: >
          steps.check.outcome == 'success' &&
          steps.check.outputs.cancellable-run-id != '' &&
          steps.check.outputs.cancellable-run-id != 'null'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.check.outputs.cancellable-run-id }}
        run: |
          echo "::notice ::Cancelling tests on closed PR #$PR"
          gh run cancel "$RUN_ID"

  delete-branch:
    if: >
      github.repository_owner == 'chenrui333' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.merged
    runs-on: ubuntu-latest
    # Ignore errors as branch may already be deleted
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          gh api \
            -X DELETE \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH"
