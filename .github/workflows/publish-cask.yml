name: brew cask-merge

on:
  pull_request_target:
    types:
      - labeled

jobs:
  cask-merge:
    if: |
      contains(github.event.pull_request.labels.*.name, 'pr-cask-merge') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.state == 'open' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate changed files are cask-only
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mapfile -t files < <(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "PR has no changed files."
            exit 1
          fi

          for file in "${files[@]}"; do
            # Cask signing exceptions are part of cask-only maintenance.
            if [[ ! "$file" =~ ^Casks/ && "$file" != "audit_exceptions/signing_audit_skiplist.json" ]]; then
              echo "Non-cask file detected in cask merge workflow: $file"
              exit 1
            fi
          done

      - name: Merge cask PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch --repo "$GITHUB_REPOSITORY"
